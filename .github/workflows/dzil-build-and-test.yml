---
name: dzil build and test

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-job:
    name: Build distribution
    runs-on: ubuntu-24.04
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v6
      - name: Run Tests
        env:
          AUTHOR_TESTING: 1
          AUTOMATED_TESTING: 1
          EXTENDED_TESTING: 1
          RELEASE_TESTING: 1
          NO_JIGSAW: 1
          SENDMAIL: "/usr/sbin/sendmail" # for compilation test of LWP::Protocol::mailto
        run: upgrade-perl-helpers && auto-build-and-test-dist
      - uses: actions/upload-artifact@v7
        with:
          name: build_dir
          path: build_dir
  coverage-job:
    needs: build-job
    runs-on: ubuntu-24.04
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v6 # codecov wants to be inside a Git repository
      - uses: actions/download-artifact@v8
        with:
          name: build_dir
          path: .
      - name: Install deps and test
        run: cpan-install-dist-deps && cpanm -U -f Test::LeakTrace && test-dist
        env:
          NO_JIGSAW: 1
          SENDMAIL: "/usr/sbin/sendmail" # for compilation test of LWP::Protocol::mailto
          CODECOV_TOKEN: ${{secrets.CODECOV_TOKEN}}
  ubuntu-test-job:
    needs: build-job
    runs-on: "ubuntu-24.04"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        perl-version:
          - "5.14"
          - "5.16"
          - "5.18"
          - "5.20"
          - "5.22"
          - "5.24"
          - "5.26"
          - "5.28"
          - "5.30"
          - "5.32"
          - "5.34"
          - "5.36"
          - "5.38"
          - "5.40"
          - "5.42"
    name: perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    steps:
      - name: set up perl
        uses: shogo82148/actions-setup-perl@v1.41.1
        with:
          perl-version: ${{ matrix.perl-version }}
      - uses: actions/download-artifact@v8
        with:
          name: build_dir
          path: .
      - uses: perl-actions/setup-cpm@v1
        with:
          version: compat
      - name: install deps using cpm
        run: cpm install -g --cpanfile cpanfile --with-suggests --with-recommends --with-test
      - name: install sendmail
        run: sudo apt-get install -y --no-install-recommends sendmail-bin
      - run: prove -lr t
        env:
          AUTHOR_TESTING: 0
          RELEASE_TESTING: 0
          NO_JIGSAW: 1
  macos-test-job:
    needs: build-job
    runs-on: "macos-latest"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        perl-version:
          - "5.24"
          - "5.26"
          - "5.28"
          - "5.30"
          - "5.32"
          - "5.34"
          - "5.36"
          - "5.38"
          - "5.40"
          - "5.42"
    name: perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    steps:
      - name: set up perl
        uses: shogo82148/actions-setup-perl@v1.41.1
        with:
          perl-version: ${{ matrix.perl-version }}
      - uses: actions/download-artifact@v8
        with:
          name: build_dir
          path: .
      - uses: perl-actions/setup-cpm@v1
        with:
          version: compat
      - name: install deps using cpm
        run: cpm install -g --cpanfile cpanfile --with-suggests --with-recommends --with-test
      - run: prove -lr t
        env:
          AUTHOR_TESTING: 0
          RELEASE_TESTING: 0
          NO_JIGSAW: 1
  windows-test-job:
    needs: build-job
    runs-on: "windows-2025"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025]
        perl-version:
          - "5.28"
          - "5.30"
    name: perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    steps:
      - name: set up perl
        uses: shogo82148/actions-setup-perl@v1.41.1
        with:
          perl-version: ${{ matrix.perl-version }}
          distribution: strawberry # this option only used on windows
      - uses: actions/download-artifact@v8
        with:
          name: build_dir
          path: .
      - uses: perl-actions/setup-cpm@v1
        with:
          version: compat
      - name: install deps using cpm
        run: cpm install -g --cpanfile cpanfile --with-suggests --with-recommends --with-test
      - run: prove -lr t
        env:
          AUTHOR_TESTING: 0
          RELEASE_TESTING: 0
          NO_JIGSAW: 1
